<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BASSMA SENTRY - Driver Monitor</title>
    <!-- PWA metas -->
    <link rel="manifest" href="data:application/manifest+json,{
        \"name\":\"BASSMA SENTRY\",
        \"short_name\":\"SENTRY\",
        \"start_url\":\".\",
        \"display\":\"standalone\",
        \"theme_color\":\"#0A0B0D\",
        \"background_color\":\"#0A0B0D\"
    }">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Leaflet & fonts -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        :root {
            --tesla-red: #E81922;
            --tesla-blue: #3498db;
            --bg-dark: #0A0B0D;
            --card-bg: rgba(30, 31, 34, 0.95);
        }
        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        /* Formulaire plein écran */
        #form-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 32px 24px;
            width: 85%;
            max-width: 400px;
            border: 1px solid rgba(52,152,219,0.4);
            box-shadow: 0 0 30px rgba(52,152,219,0.2);
        }
        .form-card h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 28px;
            color: var(--tesla-blue);
        }
        .form-card input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: #1e1f24;
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            border-bottom: 2px solid var(--tesla-blue);
            outline: none;
            box-sizing: border-box;
        }
        .form-card button {
            width: 100%;
            background: var(--tesla-blue);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            color: black;
            margin-top: 10px;
            cursor: pointer;
        }
        /* Interface principale */
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, transparent);
            position: absolute;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--tesla-blue);
            text-shadow: 0 0 10px rgba(52,152,219,0.5);
        }
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }
        .dashboard-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .stat-box {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.4rem; font-weight: 700; color: white; display: block; }
        .unit { font-size: 0.7rem; color: var(--tesla-blue); }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 30px;
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            color: #2ecc71;
            font-weight: bold;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(46,204,113,0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46,204,113,0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46,204,113,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46,204,113,0); }
        }
        .leaflet-container { background: #0b0d10 !important; }
        .leaflet-tile-pane { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3); }
    </style>
</head>
<body>

<!-- Formulaire initial -->
<div id="form-screen">
    <div class="form-card">
        <h2>🔐 BASSMA SENTRY</h2>
        <input type="text" id="driverId" placeholder="ID conducteur (ex: BASSMA01)" autocomplete="off">
        <input type="text" id="matricule" placeholder="Matricule (ex: 46-أ-65528)" autocomplete="off">
        <input type="text" id="destination" placeholder="Destination (ex: Hôpital Mohammed V)" autocomplete="off">
        <button id="startBtn">▶ DÉMARRER LA SURVEILLANCE</button>
    </div>
</div>

<!-- Interface principale (cachée au départ) -->
<div id="main-app" style="display: none;">
    <header><h1>BASSMA SENTRY - FLUX GPS</h1></header>
    <div id="map"></div>
    <div class="dashboard-overlay">
        <div class="stats-grid">
            <div class="stat-box"><span class="label">Vitesse</span><span class="value" id="speed">0</span><span class="unit">KM/H</span></div>
            <div class="stat-box"><span class="label">Précision</span><span class="value" id="accuracy">0</span><span class="unit">MÈTRES</span></div>
        </div>
        <div class="status-bar" id="status-container">
            <div class="pulse"></div>
            <span id="status-text">GPS ACTIF</span>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ================= CONFIGURATION =================
    // REMPLACEZ PAR L'URL DE VOTRE WEBHOOK N8N (ngrok ou serveur)
    const WEBHOOK_URL = "https://votre-ngrok.ngrok.io/webhook/bassma-alerts";
    
    let map, marker, circle;
    let lastSendTime = 0;
    let watchId = null;
    let initSent = false;          // évite de renvoyer le payload INIT plusieurs fois
    
    // Infos conducteur (remplies par le formulaire)
    let driver = {
        id: "",
        matricule: "",
        destination: ""
    };
    
    // Position courante
    let currentPos = {
        lat: 32.2927,
        lon: -9.2345,
        speed: 0,
        accuracy: 0
    };
    
    // ================= FORMULAIRE =================
    document.getElementById('startBtn').addEventListener('click', async () => {
        const id = document.getElementById('driverId').value.trim();
        const matricule = document.getElementById('matricule').value.trim();
        const destination = document.getElementById('destination').value.trim();
        
        if (!id || !matricule || !destination) {
            alert("Veuillez remplir tous les champs (ID, Matricule, Destination)");
            return;
        }
        
        driver = { id, matricule, destination };
        
        // Démarrer la géolocalisation immédiatement (pour obtenir la position initiale)
        if (!navigator.geolocation) {
            alert("GPS non supporté sur ce navigateur");
            return;
        }
        
        // On active l'interface
        document.getElementById('form-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        
        initMap();
        
        // Lancement du GPS (watchPosition)
        startGPS();
    });
    
    // ================= CARTE =================
    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([currentPos.lat, currentPos.lon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const teslaIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#3498db; width:15px; height:15px; border-radius:50%; border:3px solid white; box-shadow:0 0 15px #3498db;'></div>",
            iconSize: [21,21],
            iconAnchor: [10,10]
        });
        
        marker = L.marker([currentPos.lat, currentPos.lon], { icon: teslaIcon }).addTo(map);
        circle = L.circle([currentPos.lat, currentPos.lon], { radius: 20, color: '#3498db', fillOpacity: 0.1 }).addTo(map);
    }
    
    // ================= ENVOI VERS N8N =================
    async function sendToN8n(alertType, additionalData = {}) {
        let payload;
        if (alertType === "INIT") {
            // Premier envoi : toutes les informations fixes + position
            payload = {
                alert_type: "INIT",
                driver_id: driver.id,
                matricule: driver.matricule,
                destination: driver.destination,
                lat: currentPos.lat,
                lon: currentPos.lon,
                speed: currentPos.speed,
                timestamp: new Date().toISOString(),
                ...additionalData
            };
        } else if (alertType === "GPS_UPDATE") {
            // Envoi périodique : seulement les données variables
            payload = {
                alert_type: "GPS_UPDATE",
                lat: currentPos.lat,
                lon: currentPos.lon,
                speed: currentPos.speed,
                timestamp: new Date().toISOString()
            };
        } else {
            // Autres (non utilisés ici mais gardé pour extensibilité)
            payload = { alert_type: alertType, ...additionalData };
        }
        
        try {
            const response = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            console.log(`✅ [${alertType}] envoyé`, payload);
            // Mise à jour du statut visuel (optionnel)
            const statusSpan = document.getElementById('status-text');
            if (statusSpan && alertType === "GPS_UPDATE") {
                statusSpan.innerText = "DONNÉES ENVOYÉES";
                setTimeout(() => { if (statusSpan) statusSpan.innerText = "GPS ACTIF"; }, 2000);
            }
        } catch (error) {
            console.error(`❌ Erreur envoi ${alertType}:`, error);
            const statusSpan = document.getElementById('status-text');
            if (statusSpan) statusSpan.innerText = "ERREUR ENVOI";
        }
    }
    
    // ================= GEOLOCALISATION =================
    function startGPS() {
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const { latitude, longitude, speed, accuracy } = position.coords;
                // Mise à jour des variables
                currentPos.lat = latitude;
                currentPos.lon = longitude;
                currentPos.speed = speed ? (speed * 3.6).toFixed(0) : 0;
                currentPos.accuracy = accuracy.toFixed(0);
                
                // Mise à jour de l'interface
                document.getElementById('speed').innerText = currentPos.speed;
                document.getElementById('accuracy').innerText = currentPos.accuracy;
                
                // Déplacement de la carte
                const latlng = [latitude, longitude];
                if (marker) marker.setLatLng(latlng);
                if (circle) circle.setLatLng(latlng);
                if (circle) circle.setRadius(accuracy);
                if (map) map.panTo(latlng);
                
                // --- Gestion des envois ---
                // 1) Envoi INIT une seule fois (dès qu'on a une position valide)
                if (!initSent && currentPos.lat !== 32.2927) { // évite la position par défaut
                    initSent = true;
                    sendToN8n("INIT");
                }
                
                // 2) Envoi périodique toutes les 20 secondes (GPS_UPDATE)
                const now = Date.now();
                if (initSent && (now - lastSendTime) >= 20000) {
                    lastSendTime = now;
                    sendToN8n("GPS_UPDATE");
                }
            },
            (error) => {
                console.error("Erreur GPS:", error);
                const statusSpan = document.getElementById('status-text');
                if (statusSpan) {
                    statusSpan.innerText = "GPS DÉCONNECTÉ";
                    document.getElementById('status-container').style.color = "#e74c3c";
                }
            },
            {
                enableHighAccuracy: true,
                maximumAge: 0,
                timeout: 5000
            }
        );
    }
</script>
</body>
</html>
