<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Driver Monitoring System - Driver Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        :root {
            --tesla-red: #E81922;
            --tesla-blue: #3498db;
            --bg-dark: #0A0B0D;
            --card-bg: rgba(30, 31, 34, 0.95);
            --border-glow: 0 0 8px rgba(52,152,219,0.3);
        }
        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        /* Formulaire plein écran */
        #form-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        .form-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 28px 24px;
            width: 90%;
            max-width: 480px;
            border: 1px solid rgba(52,152,219,0.4);
            box-shadow: 0 0 30px rgba(52,152,219,0.2);
            margin: 20px;
        }
        .form-card h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 24px;
            color: var(--tesla-blue);
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: #9aa0b0;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #1e1f24;
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            border-bottom: 2px solid var(--tesla-blue);
            outline: none;
        }
        .inline-group {
            display: flex;
            gap: 12px;
        }
        .inline-group .form-group {
            flex: 1;
        }
        button {
            width: 100%;
            background: var(--tesla-blue);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            color: black;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .error-msg {
            color: var(--tesla-red);
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
        }
        /* Interface principale */
        #main-app {
            display: none;
        }
        header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, transparent);
            position: absolute;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--tesla-blue);
            text-shadow: 0 0 10px rgba(52,152,219,0.5);
        }
        #map {
            height: 100vh;
            width: 100vw;
            z-index: 1;
        }
        .dashboard-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .stat-box {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }
        .label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }
        .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            display: block;
        }
        .unit {
            font-size: 0.7rem;
            color: var(--tesla-blue);
        }
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 30px;
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            color: #2ecc71;
            font-weight: bold;
        }
        .pulse {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(46,204,113,0.7);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46,204,113,0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46,204,113,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46,204,113,0); }
        }
        .leaflet-container { background: #0b0d10 !important; }
        .leaflet-tile-pane { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3); }
    </style>
</head>
<body>

<!-- Formulaire d'initialisation -->
<div id="form-screen">
    <div class="form-card">
        <h2>🔐 Driver Monitoring System </h2>
        
<div class="form-group">
    <label>Nom</label>
    <input type="text" id="lastname" placeholder="Ex: BENALI" autocomplete="off" oninput="this.value = this.value.replace(/[0-9]/g, '').toUpperCase()">
    <div class="error-msg" id="error-lastname">Lettres et espaces uniquement</div>
</div>

<div class="form-group">
    <label>Prénom</label>
    <input type="text" id="firstname" placeholder="Ex: MOHAMED" autocomplete="off" oninput="this.value = this.value.replace(/[0-9]/g, '')">
    <div class="error-msg" id="error-firstname">Lettres et espaces uniquement</div>
</div>
        
        <!-- Matricule marocain : 3 champs -->
        <div class="form-group">
            <label>Matricule - Lettre arabe</label>
            <select id="arabicLetter">
                <option value="">-- Choisir --</option>
                <option value="أ">أ</option><option value="ب">ب</option><option value="ت">ت</option>
                <option value="ث">ث</option><option value="ج">ج</option><option value="ح">ح</option>
                <option value="خ">خ</option><option value="د">د</option><option value="ذ">ذ</option>
                <option value="ر">ر</option><option value="ز">ز</option><option value="س">س</option>
                <option value="ش">ش</option><option value="ص">ص</option><option value="ض">ض</option>
                <option value="ط">ط</option><option value="ظ">ظ</option><option value="ع">ع</option>
                <option value="غ">غ</option><option value="ف">ف</option><option value="ق">ق</option>
                <option value="ك">ك</option><option value="ل">ل</option><option value="م">م</option>
                <option value="ن">ن</option><option value="ه">ه</option><option value="و">و</option>
                <option value="ي">ي</option>
            </select>
            <div class="error-msg" id="error-letter">Sélectionnez une lettre</div>
        </div>
        <div class="inline-group">
            <div class="form-group">
                <label>Code préfecture (1-89)</label>
                <input type="number" id="prefectureCode" min="1" max="89" placeholder="Ex: 46">
                <div class="error-msg" id="error-prefecture">Doit être entre 1 et 89</div>
            </div>
            <div class="form-group">
                <label>Numéro (5 chiffres)</label>
                <input type="text" id="plateNumber" maxlength="5" placeholder="Ex: 65528">
                <div class="error-msg" id="error-plateNumber">5 chiffres exactement</div>
            </div>
        </div>
        
        <div class="form-group">
            <label>Destination (ville / village)</label>
            <input type="text" id="destination" placeholder="Ex: Safi, Marrakech, Casablanca" autocomplete="off">
            <div class="error-msg" id="error-destination">Ville ou village obligatoire</div>
        </div>
        
        <button id="startBtn">▶ DÉMARRER LA SURVEILLANCE</button>
    </div>
</div>

<!-- Interface principale -->
<div id="main-app">
    <header><h1>Driver Monitoring System - TELEMETRY</h1></header>
    <div id="map"></div>
    <div class="dashboard-overlay">
        <div class="stats-grid">
            <div class="stat-box"><span class="label">Vitesse</span><span class="value" id="speed">0</span><span class="unit">KM/H</span></div>
            <div class="stat-box"><span class="label">Précision</span><span class="value" id="accuracy">0</span><span class="unit">M</span></div>
        </div>
        <div class="status-bar"><div class="pulse"></div><span id="status-text">GPS ACTIF</span></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ================= CONFIGURATION =================
    
    const WEBHOOK_URL = "https://skewed-buffoon-jovial.ngrok-free.dev/webhook-test/somnolence-alerte ";
    
    let map, marker, circle;
    let lastSendTime = 0;
    let watchId = null;
    let initSent = false;
    let intervalId = null;
    
    // Infos conducteur
    let driver = {
        nom: "",
        prenom: "",
        matricule: "", // sera construit
        destination: ""
    };
    
    let currentPos = {
        lat: 32.2927,
        lon: -9.2345,
        speed: 0,
        accuracy: 0
    };
    
    // ================= VALIDATION FORMULAIRE =================
    function validateName(value) {
        return /^[A-Za-z\u00C0-\u00FF\s]+$/.test(value); // lettres, accents, espaces
    }
    
    function validateForm() {
        let isValid = true;
        
        const lastname = document.getElementById('lastname').value.trim();
        const firstname = document.getElementById('firstname').value.trim();
        const arabicLetter = document.getElementById('arabicLetter').value;
        const prefectureCode = document.getElementById('prefectureCode').value;
        const plateNumber = document.getElementById('plateNumber').value.trim();
        const destination = document.getElementById('destination').value.trim();
        
        // Nom
        if (!lastname || !validateName(lastname)) {
            document.getElementById('error-lastname').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('error-lastname').style.display = 'none';
        }
        // Prénom
        if (!firstname || !validateName(firstname)) {
            document.getElementById('error-firstname').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('error-firstname').style.display = 'none';
        }
        // Lettre arabe
        if (!arabicLetter) {
            document.getElementById('error-letter').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('error-letter').style.display = 'none';
        }
        // Code préfecture 1-89
        const prefectureNum = parseInt(prefectureCode);
        if (isNaN(prefectureNum) || prefectureNum < 1 || prefectureNum > 89) {
            document.getElementById('error-prefecture').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('error-prefecture').style.display = 'none';
        }
        // 5 chiffres
        if (!/^\d{5}$/.test(plateNumber)) {
            document.getElementById('error-plateNumber').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('error-plateNumber').style.display = 'none';
        }
        // Destination
        if (!destination) {
            document.getElementById('error-destination').style.display = 'block';
            isValid = false;
        } else {
            document.getElementById('error-destination').style.display = 'none';
        }
        
        if (isValid) {
            // Construire le matricule complet
            const matriculeComplet = `${prefectureNum}-${arabicLetter}-${plateNumber}`;
            driver = {
                nom: lastname.toUpperCase(),
                prenom: firstname.toUpperCase(),
                matricule: matriculeComplet,
                destination: destination
            };
        }
        return isValid;
    }
    
    // ================= ENVOI VERS N8N =================
    async function sendToN8n(alertType, additionalData = {}) {
        let payload;
        if (alertType === "INIT") {
            payload = {
                alert_type: "INIT",
                driver_nom: driver.nom,
                driver_prenom: driver.prenom,
                matricule: driver.matricule,
                destination: driver.destination,
                lat: currentPos.lat,
                lon: currentPos.lon,
                speed: currentPos.speed,
                timestamp: new Date().toISOString(),
                ...additionalData
            };
        } else if (alertType === "GPS_UPDATE") {
            payload = {
                alert_type: "GPS_UPDATE",
                lat: currentPos.lat,
                lon: currentPos.lon,
                speed: currentPos.speed,
                timestamp: new Date().toISOString()
            };
        } else {
            payload = { alert_type: alertType, ...additionalData };
        }
        
        try {
            await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            console.log(`✅ [${alertType}] envoyé`);
            const statusSpan = document.getElementById('status-text');
            if (statusSpan && alertType === "GPS_UPDATE") {
                statusSpan.innerText = "TRANSMIS";
                setTimeout(() => { if (statusSpan) statusSpan.innerText = "GPS ACTIF"; }, 2000);
            }
        } catch (error) {
            console.error(`❌ Erreur ${alertType}:`, error);
        }
    }
    
    // ================= CARTE =================
    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([currentPos.lat, currentPos.lon], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const icon = L.divIcon({
            html: "<div style='background-color:#3498db; width:15px; height:15px; border-radius:50%; border:2px solid white; box-shadow:0 0 12px #3498db;'></div>",
            iconSize: [15,15],
            iconAnchor: [7,7]
        });
        marker = L.marker([currentPos.lat, currentPos.lon], { icon }).addTo(map);
        circle = L.circle([currentPos.lat, currentPos.lon], { radius: 20, color: '#3498db', fillOpacity: 0.1 }).addTo(map);
    }
    
    // ================= GEOLOCALISATION =================
    function startGPS() {
        if (!navigator.geolocation) {
            document.getElementById('status-text').innerText = "GPS NON SUPPORTÉ";
            return;
        }
        
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                const { latitude, longitude, speed, accuracy } = position.coords;
                currentPos.lat = latitude;
                currentPos.lon = longitude;
                currentPos.speed = speed ? (speed * 3.6).toFixed(0) : 0;
                currentPos.accuracy = accuracy.toFixed(0);
                
                document.getElementById('speed').innerText = currentPos.speed;
                document.getElementById('accuracy').innerText = currentPos.accuracy;
                
                if (marker) marker.setLatLng([latitude, longitude]);
                if (circle) circle.setLatLng([latitude, longitude]);
                if (circle) circle.setRadius(accuracy);
                if (map) map.panTo([latitude, longitude]);
                
                // Envoi INIT une seule fois (dès première position correcte)
                if (!initSent && latitude !== 32.2927 && longitude !== -9.2345) {
                    initSent = true;
                    sendToN8n("INIT");
                    // Démarrer l'envoi périodique toutes les 1 minute (60000 ms)
                    if (intervalId) clearInterval(intervalId);
                    intervalId = setInterval(() => {
                        sendToN8n("GPS_UPDATE");
                    }, 60000);
                }
            },
            (error) => {
                console.error("GPS error", error);
                document.getElementById('status-text').innerText = "GPS DÉCONNECTÉ";
            },
            { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
        );
    }
    
    // ================= DÉMARRAGE =================
    document.getElementById('startBtn').addEventListener('click', () => {
        if (validateForm()) {
            document.getElementById('form-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            initMap();
            startGPS();
        } else {
            alert("Veuillez corriger les erreurs dans le formulaire.");
        }
    });
</script>
</body>
</html>
