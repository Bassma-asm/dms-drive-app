
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ambulance Pro - Driver Terminal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tesla-red: #E81922;
            --tesla-blue: #3498db;
            --bg-dark: #0A0B0D;
            --card-bg: rgba(30, 31, 34, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* --- STYLE DU FORMULAIRE D'ACCÈS --- */
        #login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .login-card h2 { font-family: 'Orbitron'; color: var(--tesla-blue); margin-bottom: 25px; font-size: 1.2rem; }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            font-family: 'Rajdhani';
            box-sizing: border-box;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: var(--tesla-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-card button:hover { background: #2980b9; }

        /* --- DASHBOARD STYLE --- */
        header {
            padding: 20px; text-align: center;
            background: linear-gradient(to bottom, #1a1a1a, transparent);
            position: absolute; width: 100%; z-index: 1000;
        }

        h1 { font-family: 'Orbitron'; font-size: 1rem; color: var(--tesla-blue); margin: 0; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        .dashboard-overlay {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 90%; max-width: 400px;
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            backdrop-filter: blur(10px); z-index: 1000;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .stat-box { text-align: center; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .value { font-size: 1.2rem; font-weight: 700; color: white; display: block; }
        
        .status-bar {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 10px; border-radius: 30px; background: rgba(46, 204, 113, 0.1);
            color: #2ecc71; font-weight: bold; font-size: 0.8rem;
        }

        .pulse { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .leaflet-tile-pane { filter: brightness(0.5) invert(1) contrast(3) hue-rotate(200deg); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h2>MVD-X TERMINAL</h2>
            <input type="text" id="in_driver_id" placeholder="ID CONDUCTEUR (ex: Bassma_01)">
            <input type="text" id="in_plate" placeholder="MATRICULE (ex: 46-A-65528)">
            <input type="text" id="in_dest" placeholder="DESTINATION (Ville)">
            <button onclick="startMission()">DÉMARRER LA MISSION</button>
        </div>
    </div>

    <header>
        <h1 id="top-title">BASSMA TRUCK - STANDBY</h1>
    </header>

    <div id="map"></div>

    <div class="dashboard-overlay">
        <div class="stats-grid">
            <div class="stat-box">
                <span class="label">Vitesse</span>
                <span class="value" id="speed">0</span>
                <span class="unit" style="font-size: 0.6rem; color:var(--tesla-blue)">KM/H</span>
            </div>
            <div class="stat-box">
                <span class="label">Mission</span>
                <span class="value" id="disp-plate" style="font-size: 0.9rem;">---</span>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="pulse"></div>
            <span id="status-text">EN ATTENTE DE CONNEXION</span>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const webhookUrl = "https://skewed-buffoon-jovial.ngrok-free.dev/webhook/somnolence-alerte";
        let map, marker, circle;
        let lastSendTime = 0; 
        
        // Données de mission
        let missionData = {
            id: "",
            plate: "",
            destination: ""
        };

        function startMission() {
            const id = document.getElementById('in_driver_id').value;
            const plate = document.getElementById('in_plate').value;
            const dest = document.getElementById('in_dest').value;

            if(!id || !plate || !dest) {
                alert("Veuillez remplir tous les champs !");
                return;
            }

            missionData = { id, plate, destination: dest };
            
            // UI Update
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('top-title').innerText = `MISSION: ${dest.toUpperCase()}`;
            document.getElementById('disp-plate').innerText = plate;
            document.getElementById('status-text').innerText = "TRANSMISSION ACTIVE";

            initMap();
            startTracking();
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([32.2927, -9.2345], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            const teslaIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#3498db; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow: 0 0 10px #3498db;'></div>",
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            marker = L.marker([32.2927, -9.2345], { icon: teslaIcon }).addTo(map);
            circle = L.circle([32.2927, -9.2345], { radius: 20, color: '#3498db', fillOpacity: 0.1 }).addTo(map);
        }

        async function sendToN8n(pos) {
            const currentTime = Date.now();
            if (currentTime - lastSendTime < 15000) return; // Envoi toutes les 15s

            lastSendTime = currentTime;

            const payload = {
                alert_type: "GPS_UPDATE",
                driver_id: missionData.id,
                plate_number: missionData.plate,
                destination: missionData.destination,
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                speed: pos.coords.speed ? (pos.coords.speed * 3.6).toFixed(0) : 0,
                timestamp: new Date().toISOString()
            };

            try {
                await fetch(webhookUrl, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        "ngrok-skip-browser-warning": "69420"
                    },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error("Link error"); }
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude, speed } = pos.coords;
                    const latlng = [latitude, longitude];

                    document.getElementById('speed').innerText = speed ? (speed * 3.6).toFixed(0) : "0";
                    
                    if(marker) {
                        marker.setLatLng(latlng);
                        circle.setLatLng(latlng);
                        map.panTo(latlng);
                    }

                    sendToN8n(pos);
                }, null, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
