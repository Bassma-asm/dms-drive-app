<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MVD-X | Maroc Vigilance Drive</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3498db; --danger: #e74c3c; --bg: #0A0B0D; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        
        /* Formulaire d'initialisation */
        #init-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: 0.5s;
        }
        .input-group { width: 80%; max-width: 300px; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; background: #1a1f25; border: 1px solid #333; 
            color: white; border-radius: 8px; font-family: 'Rajdhani'; font-size: 1rem;
        }
        button { 
            width: 85%; max-width: 320px; padding: 15px; background: var(--accent); 
            border: none; color: white; font-family: 'Orbitron'; font-weight: bold; border-radius: 8px;
        }

        #map { height: 100vh; width: 100vw; filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg); }
        
        .dash {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(20, 22, 26, 0.9);
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .val { font-size: 1.8rem; font-weight: bold; color: var(--accent); display: block; }
        .lab { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="init-overlay">
    <h1 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:30px;">MVD-X START</h1>
    <div class="input-group"><input type="text" id="driver_id" placeholder="ID CONDUCTEUR"></div>
    <div class="input-group"><input type="text" id="plate" placeholder="MATRICULE (ex: 46-A-65528)"></div>
    <div class="input-group"><input type="text" id="dest" placeholder="DESTINATION"></div>
    <button onclick="startMission()">DÉMARRER LA MISSION</button>
</div>

<div id="map"></div>

<div class="dash">
    <div class="stats">
        <div style="text-align:center"><span class="lab">Vitesse</span><span id="spd" class="val">0</span><span class="lab">km/h</span></div>
        <div style="text-align:center"><span class="lab">Précision</span><span id="acc" class="val">0</span><span class="lab">m</span></div>
    </div>
    <div id="status" style="text-align:center; color:#2ecc71; font-weight:bold; font-size:0.9rem;">● TRANSMISSION ACTIVE</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let m, marker, conf = { id: '', plate: '', dest: '' };
    const webhook = "https://skewed-buffoon-jovial.ngrok-free.dev/webhook/somnolence-alerte";

    function startMission() {
        conf.id = document.getElementById('driver_id').value;
        conf.plate = document.getElementById('plate').value;
        conf.dest = document.getElementById('dest').value;
        if(!conf.id || !conf.plate) return alert("Remplir les champs !");
        document.getElementById('init-overlay').style.display = 'none';
        initGps();
    }

    function initGps() {
        m = L.map('map', { zoomControl: false }).setView([32.29, -9.23], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
        marker = L.circleMarker([32.29, -9.23], { radius: 8, color: '#3498db', fillOpacity: 1 }).addTo(m);

        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed, accuracy } = pos.coords;
            const latlng = [latitude, longitude];
            marker.setLatLng(latlng);
            m.panTo(latlng);
            document.getElementById('spd').innerText = speed ? (speed * 3.6).toFixed(0) : 0;
            document.getElementById('acc').innerText = accuracy.toFixed(0);
            
            fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                body: JSON.stringify({
                    type: "REALTIME_VIGILANCE",
                    driver: conf.id,
                    plate: conf.plate,
                    destination: conf.dest,
                    lat: latitude, lon: longitude,
                    speed: speed || 0
                })
            }).catch(() => {});
        }, null, { enableHighAccuracy: true });
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
